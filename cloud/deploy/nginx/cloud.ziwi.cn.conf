# ============================================================
# cloud.ziwi.cn — 宿主机 system nginx server block
# ------------------------------------------------------------
# 提供方：主理人（架构决策见 docs/multi-product-platform-integration.md §6.1 / §6.2）
# 落盘方：mfg 团队 / 获主理人授权者，放到 CVM 193.112.163.147 的：
#         /etc/nginx/conf.d/cloud.ziwi.cn.conf
# 生效命令：nginx -t && systemctl reload nginx
#
# 设计要点（对应 §6.1「cloud 容器栈全走内部端口」）：
#  - 容器端口已通过 docker-compose.yml 绑定到 127.0.0.1，仅宿主本机可达，
#    不直接暴露到公网；对外统一由本宿主机 nginx 反代。
#  - /api/ 与 /health 直连 backend 容器（127.0.0.1:8000），
#    避免再经 frontend 容器二次反代（frontend 容器内的 /api 反代不被外部流量触发）。
#  - 前端 SPA 静态由 frontend 容器（127.0.0.1:3000）托管，history 路由回退交其容器 nginx。
#  - SSL 证书为 acme.sh 签发的 *.ziwi.cn 通配符（DNS-01，DNSPod API），
#    可同时覆盖 cloud / heartbeat 等多子域。
#  - 绝对不要手工把宿主机 :80 / :5432 映射给 cloud 容器（§6.1 明示）。
# ============================================================

# ---- HTTP 80：强制 301 跳转 HTTPS（兼作 ACME HTTP-01 兜底，本场景用 DNS-01）----
server {
    listen 80;
    server_name cloud.ziwi.cn;
    return 301 https://$host$request_uri;
}

# ---- HTTPS 443：对外服务入口 ----
server {
    listen 443 ssl;
    server_name cloud.ziwi.cn;

    # ===== SSL（acme.sh 通配符 *.ziwi.cn，DNSPod DNS-01）=====
    # 注意：acme.sh 实际落地路径以 `acme.sh --list` 或 `ls /root/.acme.sh/` 输出为准。
    # 下方为 ec-256 通配符证书的默认命名；若签发的是 RSA（非 ecc），目录名去掉后缀 _ecc。
    ssl_certificate     /root/.acme.sh/*.ziwi.cn_ecc/fullchain.cer;
    ssl_certificate_key /root/.acme.sh/*.ziwi.cn_ecc/*.ziwi.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ===== 反代：API / 健康检查 直连 backend 容器（127.0.0.1:8000）=====
    # 路由前缀 /api/v1/* 由 backend 承载；/api/ 不带 trailing slash，
    # 保证完整 URI（/api/v1/auth/...）原样转发到 backend。
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /health 为 backend 根级健康检查端点，单独精确匹配，避免落入 / 反代。
    location = /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== 反代：前端 SPA 静态（frontend 容器 nginx，127.0.0.1:3000）=====
    # /api/ 已在宿主层被上方 location 拦截直连 backend，故此处不会二次反代。
    # frontend 容器 nginx 负责 SPA history 路由回退（try_files ... /index.html）。
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 可选：后端不可用时返回静态错误页
    # error_page 502 /502.html;
    # location = /502.html { root /usr/share/nginx/html; internal; }
}
