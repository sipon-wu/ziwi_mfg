server {
    listen 80;
    server_name mfg1.ziwi.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mfg1.ziwi.cn;

    ssl_certificate      /root/.acme.sh/*.ziwi.cn_ecc/fullchain.cer;
    ssl_certificate_key  /root/.acme.sh/*.ziwi.cn_ecc/*.ziwi.cn.key;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          HIGH:!aNULL:!MD5;

    # 前端静态资源由 nginx 直接托管（/opt/mfg1/frontend），不走后端
    root /opt/mfg1/frontend;
    index index.html;

    # 带哈希的静态资源：长效缓存（内容不变则 URL 不变，可安全 immutable）
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA 入口与兜底：禁止缓存，确保每次部署立即生效
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
