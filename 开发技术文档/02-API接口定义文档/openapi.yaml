openapi: "3.0.3"
info:
  title: 知微 ziwi SaaS 平台 API
  description: |
    知微(SaaS)平台 — Phase 1 核心业务 API 文档

    ## 认证方式
    - **Bearer JWT**: `Authorization: Bearer <token>` — 用户身份认证
    - **X-Tenant-Id**: 请求头 — 多租户识别（SaaS 模式必传）
    - **X-Deploy-Mode**: 请求头 — 部署模式: saas / onprem / multi-factory
    - **X-Factory-Id**: 请求头 — 工厂ID（multi-factory 模式必传）
    - **X-License-Key**: 请求头 — 许可证密钥（onprem 模式必传）

    ## API 版本
    - URL 路径版本: `/api/v1/{resource}`
    - 同一接口保留 2 个版本，v1 废弃前 3 个月发送 `X-API-Deprecated` 头

    ## 分页规范
    - `page`: 从 1 开始
    - `page_size`: 默认 20，最大 100
    - `total`: 总记录数
    - 响应格式: `{ "items": [], "total": 0, "page": 1, "page_size": 20 }`

    ## 错误响应格式
    ```json
    {
      "code": "400-1001",
      "message": "参数校验失败：必填字段缺失",
      "request_id": "req_abc123"
    }
    ```

    ## 错误码清单
    | code | 说明 |
    |------|------|
    | 400-0000 | 请求参数错误 |
    | 400-1001 | 参数校验失败：必填字段缺失 |
    | 400-1002 | 参数校验失败：格式错误 |
    | 400-1003 | 参数校验失败：值超出允许范围 |
    | 400-2001 | 业务规则冲突：库存不足 |
    | 400-2002 | 业务规则冲突：状态不允许此操作 |
    | 400-2003 | 业务规则冲突：数据已存在（重复） |
    | 401-0000 | 未认证 |
    | 401-1001 | Token 无效或已过期 |
    | 401-1002 | Token 格式错误 |
    | 401-1003 | OAuth 授权失败 |
    | 403-0000 | 无权限 |
    | 403-1001 | 模块未购买（租户未启用该模块） |
    | 403-1002 | 用户角色无此操作权限 |
    | 403-1003 | 数据范围权限不足（不可跨工厂操作） |
    | 404-0000 | 资源不存在 |
    | 404-1001 | 查询的资源 ID 不存在 |
    | 404-1002 | 关联的父资源不存在 |
    | 409-0000 | 数据冲突 |
    | 409-1001 | 并发修改冲突（乐观锁版本号不一致） |
    | 409-1002 | 重复提交（请求 ID 已存在） |
    | 429-0000 | 请求过频繁 |
    | 429-1001 | API 调用频率超限（租户级别） |
    | 429-1002 | API 调用频率超限（用户级别） |
    | 429-2001 | 写入请求熔断（慢查询超阈值，5 分钟后重试） |
    | 429-2002 | 写入次数已达月度限额（试用租户） |
    | 429-2003 | Token 配额超限（AI 调用） |
    | 500-0000 | 内部服务异常 |
    | 500-1001 | 数据库连接失败 |
    | 500-1002 | 缓存服务不可用 |
    | 500-1003 | 消息队列不可用 |
    | 500-2001 | 外部服务调用失败 |
    | 500-2002 | AI 模型推理超时 |
    | 500-2003 | 文件上传失败 |
    | 503-0000 | 服务暂不可用 |
    | 503-1001 | 模块服务未部署（未购买） |
    | 503-1002 | 模块正在维护中 |
    | 503-2001 | 算力资源不足（AI 服务排队） |
  version: "1.0.0"
  contact:
    name: 知微技术团队
    email: dev@ziwi.cn

servers:
  - url: http://localhost:8000
    description: 本地开发服务器
  - url: https://api.ziwi.cn
    description: 生产环境(SaaS)

paths:
  # ==========================================
  # M00 — 认证
  # ==========================================
  /api/v1/auth/login:
    post:
      tags: ["M00-认证"]
      summary: 用户登录
      description: 使用用户名密码或手机验证码登录
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  format: password
                  example: "P@ssw0rd"
                tenant_id:
                  type: string
                  example: t_12345
              example:
                username: admin
                password: "P@ssw0rd"
                tenant_id: t_12345
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIs...
                  token_type:
                    type: string
                    example: bearer
                  expires_in:
                    type: integer
                    example: 86400
                  refresh_token:
                    type: string
                    example: rf_abc123
                  user:
                    $ref: "#/components/schemas/UserInfo"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/v1/auth/refresh:
    post:
      tags: ["M00-认证"]
      summary: 刷新 Token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Token 刷新成功

  /api/v1/auth/logout:
    post:
      tags: ["M00-认证"]
      summary: 退出登录
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 退出成功

  /api/v1/auth/change-password:
    post:
      tags: ["M00-认证"]
      summary: 修改密码
      operationId: changePassword
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password:
                  type: string
                new_password:
                  type: string
      responses:
        "200":
          description: 密码修改成功

  # ==========================================
  # M00 — 租户管理
  # ==========================================
  /api/v1/tenants:
    get:
      tags: ["M00-租户管理"]
      summary: 查询租户列表
      operationId: listTenants
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: 租户列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tenant"
                  total:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer
    post:
      tags: ["M00-租户管理"]
      summary: 创建租户
      operationId: createTenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: 租户创建成功

  /api/v1/tenants/{tenant_id}:
    get:
      tags: ["M00-租户管理"]
      summary: 查询租户详情
      operationId: getTenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 租户详情
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      tags: ["M00-租户管理"]
      summary: 更新租户信息
      operationId: updateTenant
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantRequest"
      responses:
        "200":
          description: 更新成功

  /api/v1/tenants/{tenant_id}/config:
    get:
      tags: ["M00-租户管理"]
      summary: 查询租户配置
      operationId: getTenantConfig
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
        - name: group
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 租户配置
    put:
      tags: ["M00-租户管理"]
      summary: 更新租户配置
      operationId: updateTenantConfig
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 更新成功

  # ==========================================
  # M00 — 用户管理
  # ==========================================
  /api/v1/users:
    get:
      tags: ["M00-用户管理"]
      summary: 用户列表
      operationId: listUsers
      security:
        - BearerAuth: []
        - TenantId: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: keyword
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 用户列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserInfo"
                  total:
                    type: integer
    post:
      tags: ["M00-用户管理"]
      summary: 创建用户
      operationId: createUser
      security:
        - BearerAuth: []
        - TenantId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: 创建成功

  /api/v1/users/{user_id}:
    get:
      tags: ["M00-用户管理"]
      summary: 用户详情
      operationId: getUser
      security:
        - BearerAuth: []
        - TenantId: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 用户详情
    put:
      tags: ["M00-用户管理"]
      summary: 更新用户
      operationId: updateUser
      security:
        - BearerAuth: []
        - TenantId: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 更新成功
    delete:
      tags: ["M00-用户管理"]
      summary: 删除用户(禁用)
      operationId: deleteUser
      security:
        - BearerAuth: []
        - TenantId: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 删除成功

  /api/v1/users/me:
    get:
      tags: ["M00-用户管理"]
      summary: 当前用户信息
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 当前用户信息

  # ==========================================
  # M00 — 角色管理
  # ==========================================
  /api/v1/roles:
    get:
      tags: ["M00-角色管理"]
      summary: 角色列表
      operationId: listRoles
      security:
        - BearerAuth: []
        - TenantId: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: 角色列表
    post:
      tags: ["M00-角色管理"]
      summary: 创建角色
      operationId: createRole
      security:
        - BearerAuth: []
        - TenantId: []

  /api/v1/roles/{role_id}:
    get:
      tags: ["M00-角色管理"]
      summary: 角色详情
      operationId: getRole
      security:
        - BearerAuth: []
        - TenantId: []
    put:
      tags: ["M00-角色管理"]
      summary: 更新角色
      operationId: updateRole
      security:
        - BearerAuth: []
        - TenantId: []
    delete:
      tags: ["M00-角色管理"]
      summary: 删除角色
      operationId: deleteRole
      security:
        - BearerAuth: []
        - TenantId: []

  /api/v1/roles/{role_id}/permissions:
    get:
      tags: ["M00-角色管理"]
      summary: 查询角色权限
      operationId: getRolePermissions
      security:
        - BearerAuth: []
        - TenantId: []
    put:
      tags: ["M00-角色管理"]
      summary: 分配角色权限
      operationId: assignRolePermissions
      security:
        - BearerAuth: []
        - TenantId: []

  /api/v1/roles/{role_id}/users:
    get:
      tags: ["M00-角色管理"]
      summary: 查询角色关联用户
      operationId: getRoleUsers
      security:
        - BearerAuth: []
        - TenantId: []
    post:
      tags: ["M00-角色管理"]
      summary: 为角色添加用户
      operationId: addRoleUser
      security:
        - BearerAuth: []
        - TenantId: []

  # ==========================================
  # M00 — 权限
  # ==========================================
  /api/v1/permissions:
    get:
      tags: ["M00-权限"]
      summary: 权限列表(树形)
      operationId: listPermissions
      security:
        - BearerAuth: []
        - TenantId: []
      parameters:
        - name: module_code
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 权限树

  # ==========================================
  # M00 — 消息
  # ==========================================
  /api/v1/messages:
    get:
      tags: ["M00-消息"]
      summary: 消息列表
      operationId: listMessages
      security:
        - BearerAuth: []
        - TenantId: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: is_read
          in: query
          schema:
            type: boolean
        - name: message_type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: 消息列表
    post:
      tags: ["M00-消息"]
      summary: 发送消息
      operationId: sendMessage
      security:
        - BearerAuth: []
        - TenantId: []

  /api/v1/messages/{message_id}:
    get:
      tags: ["M00-消息"]
      summary: 消息详情
      operationId: getMessage
      security:
        - BearerAuth: []
        - TenantId: []
    put:
      tags: ["M00-消息"]
      summary: 标记已读
      operationId: markMessageRead
      security:
        - BearerAuth: []
        - TenantId: []

  /api/v1/messages/unread-count:
    get:
      tags: ["M00-消息"]
      summary: 未读消息数
      operationId: getUnreadCount
      security:
        - BearerAuth: []
        - TenantId: []

  # ==========================================
  # M00 — 审批
  # ==========================================
  /api/v1/approval/templates:
    get:
      tags: ["M00-审批"]
      summary: 审批模板列表
      operationId: listApprovalTemplates
      security:
        - BearerAuth: []
        - TenantId: []
    post:
      tags: ["M00-审批"]
      summary: 创建审批模板
      operationId: createApprovalTemplate
      security:
        - BearerAuth: []
        - TenantId: []

  /api/v1/approval/templates/{template_id}:
    get:
      tags: ["M00-审批"]
      summary: 审批模板详情
      operationId: getApprovalTemplate
      security:
        - BearerAuth: []
        - TenantId: []
    put:
      tags: ["M00-审批"]
      summary: 更新审批模板
      operationId: updateApprovalTemplate
      security:
        - BearerAuth: []
        - TenantId: []

  /api/v1/approval/instances:
    get:
      tags: ["M00-审批"]
      summary: 审批实例列表
      operationId: listApprovalInstances
      security:
        - BearerAuth: []
        - TenantId: []
    post:
      tags: ["M00-审批"]
      summary: 发起审批
      operationId: createApprovalInstance
      security:
        - BearerAuth: []
        - TenantId: []

  /api/v1/approval/instances/{instance_id}:
    get:
      tags: ["M00-审批"]
      summary: 审批实例详情
      operationId: getApprovalInstance
      security:
        - BearerAuth: []
        - TenantId: []

  /api/v1/approval/instances/{instance_id}/approve:
    post:
      tags: ["M00-审批"]
      summary: 审批通过
      operationId: approveInstance
      security:
        - BearerAuth: []
        - TenantId: []

  /api/v1/approval/instances/{instance_id}/reject:
    post:
      tags: ["M00-审批"]
      summary: 审批驳回
      operationId: rejectInstance
      security:
        - BearerAuth: []
        - TenantId: []

  /api/v1/approval/instances/{instance_id}/cancel:
    post:
      tags: ["M00-审批"]
      summary: 取消审批
      operationId: cancelInstance
      security:
