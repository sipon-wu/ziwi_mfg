    get:
      tags: ["M00-字典"]
      summary: 字典列表
      operationId: listDictionaries
      security:
        - BearerAuth: []
        - TenantId: []
    post:
      tags: ["M00-字典"]
      summary: 创建字典
      operationId: createDictionary
      security:
        - BearerAuth: []
        - TenantId: []

  /api/v1/dictionary/{dict_code}/items:
    get:
      tags: ["M00-字典"]
      summary: 字典项列表
      operationId: listDictItems
      security:
        - BearerAuth: []
        - TenantId: []
    post:
      tags: ["M00-字典"]
      summary: 添加字典项
      operationId: createDictItem
      security:
        - BearerAuth: []
        - TenantId: []

  # ==========================================
  # M00 — 团队与员工
  # ==========================================
  /api/v1/teams:
    get:
      tags: ["M00-团队"]
      summary: 团队列表
      operationId: listTeams
      security:
        - BearerAuth: []
        - TenantId: []
    post:
      tags: ["M00-团队"]
      summary: 创建团队
      operationId: createTeam
      security:
        - BearerAuth: []
        - TenantId: []

  /api/v1/teams/{team_id}:
