components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT Bearer Token，从登录接口获取"
    TenantId:
      type: apiKey
      in: header
      name: X-Tenant-Id
      description: "租户ID（SaaS模式必传）"
    DeployMode:
      type: apiKey
      in: header
      name: X-Deploy-Mode
      description: "部署模式: saas / onprem / multi-factory"
    FactoryId:
      type: apiKey
      in: header
      name: X-Factory-Id
      description: "工厂ID（multi-factory模式必传）"
    LicenseKey:
      type: apiKey
      in: header
      name: X-License-Key
      description: "许可证密钥（onprem模式必传）"

  schemas:
    UserInfo:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        real_name:
          type: string
        email:
          type: string
        phone:
          type: string
        avatar_url:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    Tenant:
      type: object
      properties:
        tenant_id:
          type: string
        tenant_name:
          type: string
        tenant_code:
          type: string
        status:
          type: string
        edition:
          type: string
        deploy_mode:
          type: string
        max_users:
          type: integer
        expired_at:
          type: string
          format: date-time

    CreateTenantRequest:
      type: object
      required: [tenant_name]
      properties:
        tenant_name:
          type: string
        tenant_code:
          type: string
        contact_name:
          type: string
        contact_email:
          type: string
        edition:
          type: string
        deploy_mode:
          type: string

    UpdateTenantRequest:
      type: object
      properties:
        tenant_name:
          type: string
        contact_name:
          type: string
        contact_email:
          type: string
        max_users:
          type: integer

    CreateUserRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        real_name:
          type: string
        email:
          type: string
        phone:
          type: string
        role_ids:
          type: array
          items:
            type: integer

    ApiError:
      type: object
      properties:
        code:
          type: string
          example: "400-1001"
        message:
          type: string
        request_id:
          type: string

    PaginatedResponse:
      type: object
      properties:
        items:
          type: array
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

  parameters:
    PageParam:
      name: page
      in: query
      description: 页码，从 1 开始
      schema:
        type: integer
        default: 1
        minimum: 1
    PageSizeParam:
      name: page_size
      in: query
      description: 每页条数，默认 20，最大 100
      schema:
        type: integer
        default: 20
        maximum: 100
        minimum: 1

  responses:
    UnauthorizedError:
      description: 未认证或 Token 无效
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: "401-1001"
            message: "Token 无效或已过期"
            request_id: "req_abc123"
    ForbiddenError:
      description: 无权限
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: "403-1002"
            message: "用户角色无此操作权限"
            request_id: "req_abc123"
    NotFoundError:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: "404-0000"
            message: "资源不存在"
            request_id: "req_abc123"
    ConflictError:
      description: 数据冲突
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: "409-1001"
            message: "并发修改冲突（乐观锁版本号不一致）"
            request_id: "req_abc123"
    TooManyRequests:
      description: 请求过频繁
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: "429-1001"
            message: "API 调用频率超限（租户级别）"
            request_id: "req_abc123"
    InternalServerError:
      description: 内部服务异常
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: "500-0000"
            message: "内部服务异常"
            request_id: "req_abc123"
    ServiceUnavailable:
      description: 服务暂不可用
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            code: "503-0000"
            message: "服务暂不可用"
            request_id: "req_abc123"
