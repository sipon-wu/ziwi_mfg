      security:
        - BearerAuth: []
        - TenantId: []
    put:
      tags: ["M00-功能开关"]
      summary: 批量更新功能开关
      operationId: updateFeatureFlags
      security:
        - BearerAuth: []
        - TenantId: []

  # ==========================================
  # M01 — 生产工单
  # ==========================================
  /api/v1/work-orders:
    get:
      tags: ["M01-工单"]
      summary: 工单列表
      operationId: listWorkOrders
      security:
