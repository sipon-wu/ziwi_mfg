        - TenantId: []

  /api/v1/approval/my-pending:
    get:
      tags: ["M00-审批"]
      summary: 我的待审批列表
      operationId: getMyPendingApprovals
      security:
        - BearerAuth: []
        - TenantId: []

  # ==========================================
  # M00 — 数据字典
  # ==========================================
