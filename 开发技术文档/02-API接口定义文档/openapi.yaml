        - BearerAuth: []
        - TenantId: []

  # ==========================================
  # M00 — 许可证管理
  # ==========================================
  /api/v1/license/status/{tenant_id}:
    get:
      tags: ["M00-许可证"]
      summary: 查询许可证状态
      operationId: getLicenseStatus
      security:
        - BearerAuth: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 许可证状态

  /api/v1/license/activate:
    post:
      tags: ["M00-许可证"]
      summary: 激活许可证
      operationId: activateLicense
      responses:
        "200":
          description: 激活成功

  /api/v1/license/renew/{tenant_id}:
    post:
      tags: ["M00-许可证"]
      summary: 续期许可证
      operationId: renewLicense
      security:
        - BearerAuth: []

  /api/v1/license/revoke/{license_key}:
    post:
      tags: ["M00-许可证"]
      summary: 吊销许可证
      operationId: revokeLicense
      security:
        - BearerAuth: []

  # ==========================================
  # M00 — 功能开关
  # ==========================================
  /api/v1/feature-flags:
    get:
      tags: ["M00-功能开关"]
      summary: 功能开关列表
