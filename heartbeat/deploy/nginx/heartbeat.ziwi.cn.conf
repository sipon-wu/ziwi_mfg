# ============================================================
# heartbeat.ziwi.cn — 宿主机 system nginx server block
# ------------------------------------------------------------
# 提供方：主理人
# 落盘：CVM 193.112.163.147 的 /etc/nginx/conf.d/heartbeat.ziwi.cn.conf
# 生效命令：nginx -t && systemctl reload nginx
#
# 设计要点：
#  - 复用 cloud.ziwi.cn 的通配符证书 *.ziwi.cn_ecc
#  - /api/* 和 /health → 127.0.0.1:8091 (heartbeat-backend 容器)
#  - HTTP → HTTPS 301
# ============================================================

# ---- HTTP 80：强制 301 跳转 HTTPS ----
server {
    listen 80;
    server_name heartbeat.ziwi.cn;
    return 301 https://$host$request_uri;
}

# ---- HTTPS 443：对外服务入口 ----
server {
    listen 443 ssl;
    server_name heartbeat.ziwi.cn;

    # ===== SSL（复用 *.ziwi.cn 通配符证书）=====
    ssl_certificate     /root/.acme.sh/*.ziwi.cn_ecc/fullchain.cer;
    ssl_certificate_key /root/.acme.sh/*.ziwi.cn_ecc/*.ziwi.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ===== 反代：API / 健康检查 → heartbeat-backend (127.0.0.1:8091) =====
    location /api/ {
        proxy_pass http://127.0.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 其他路径返回 404（该服务仅暴露 API）
    location / {
        return 404;
    }
}
